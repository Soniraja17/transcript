name: Video Transcription
on:
  repository_dispatch:
    types: [generate-transcript]

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Download Video
        run: |
          curl -L "${{ github.event.client_payload.inputUrl }}" -o input.mp4

      - name: Extract Audio (Optimized for CPU)
        # 16kHz mono is the standard for Whisper
        run: ffmpeg -i input.mp4 -ar 16000 -ac 1 -c:a pcm_s16le audio.wav

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate Transcript (Whisper)
        run: |
          pip install -U openai-whisper
          # --fp16 False avoids the CPU warning and speeds up startup
          # --device cpu ensures it doesn't look for a GPU
          whisper audio.wav --model base --output_format json --output_dir ./transcripts --fp16 False --device cpu

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Sync to Cloud, Search, and DB
        env:
          MEILI_HOST: ${{ secrets.MEILI_HOST }}
          MEILI_KEY: ${{ secrets.MEILI_KEY }}
          VIDEO_ID: ${{ github.event.client_payload.videoId }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          # Install dependencies for the sync script
          bun install meilisearch @aws-sdk/client-s3 pg
          # Execute the script (ensure this script exists in your repo)
          bun run scripts/sync-transcript.ts